# Smithery configuration for CNPJ
# Schema: https://smithery.ai/docs/build/project-config
# Remote HTTP MCP — server hosted at https://api.mcp.ai/p_cnpj

name: cnpj-mcp
displayName: "CNPJ"
description: >
  Consulta cadastral pública de CNPJ (razão social, nome fantasia, situação, CNAE, porte e sócios) e descoberta dos processos da empresa e dos sócios no Diário de Justiça (DJEN). Dados públicos da Receita Federal, grátis, sem login.

version: 0.1.0
license: MIT
homepage: https://github.com/mcp-dir/cnpj-mcp
repository: https://github.com/mcp-dir/cnpj-mcp

tags:
  - cnpj
  - brazil
  - company-lookup
  - receita-federal
  - due-diligence
  - legal
  - lawsuits
  - free
  - read-only
  - no-auth

# Remote HTTP MCP — sem startCommand local (servidor já hospedado)
startCommand:
  type: http
  url: https://api.mcp.ai/p_cnpj

auth:
  type: oauth2
  resourceMetadataUrl: https://api.mcp.ai/p_cnpj/.well-known/oauth-protected-resource
  fallback:
    type: agent-auth
    description: >
      Para clientes sem OAuth 2.1. O agente expõe uma tool authenticate(token).
      Usuário gera o JWT em https://app.mcp.ai/agent-auth e cola no chat.
